slug: betfair-eng-l1l2
display_name: Betfair English League One+Two (v3 transformer + Voyage embeddings)
platform: betfair
notes: |
  V3: v2's same football_data features (now enriched from 9 -> 27 raw stats per match)
  PLUS agent-scraped news text fed into Voyage AI embeddings (voyage-3-large, 1024-dim
  per article, top-of-MTEB), pooled into per-topic slot ranges of the state vector.

  Schema rationale (hand-designed 2026-05-15; codex propose-schema unavailable due to
  daily usage cap on the codex subscription; will revisit when quota resets):
    - 27 raw football_data numerics get 240 slots in form_numeric (one slot per series,
      183 slots of headroom for future enrichment)
    - market_state gets 96 slots (3 closing-odds series x 4 lags = 12 features,
      plenty of headroom)
    - 3 text blocks (lineups, injuries, manager) each get 224 slots, fed by Voyage
      voyage-3-large embeddings. With only ~24 articles scraped, most events return
      zeros, but the small fraction with articles get full-fidelity 1024-dim embeddings
      truncated to 224 slots.
    - agent_feature_extractor block was DROPPED for v3 (codex extraction failed to
      produce real values; was emitting all 0.0 across the schema). Will revisit when
      codex quota frees up and a real extractor pass completes.

  v1 GBDT result: -7.91% net return, Brier improvement -0.16.
  v2 transformer same features: -10.79% net return, Brier improvement -0.04.
  v3 thesis: Voyage-quality embeddings + enriched football_data should move Brier
  improvement closer to (or past) zero. Net return depends on whether the extra signal
  clears the 5% commission + 50bps slippage + 150bps safety margin threshold.
time_grain: daily
held_out_months: 6
sequence_length: 32
model: transformer
data_sources:
  - name: football_data
    kind: numeric
    params:
      leagues: [E2, E3]
  - name: news_scraper
    kind: text
    params:
      topics:
        - name: lineups
          queries:
            - English League One starting lineup confirmed
            - EFL League Two team news pre match
            - EFL injury report lineup announcement
        - name: injuries
          queries:
            - English League One injury list ruled out
            - EFL League Two player injury hamstring
            - Championship loan move January window
        - name: manager
          queries:
            - English League One manager press conference
            - EFL manager interview tactics formation
            - English Football League sacking appointment
      concurrency: 3
      max_articles_per_topic: 80
label:
  kind: binary
  target_event: home_win
state_vector:
  dim: 1024
  blocks:
    - name: form_numeric
      slots: "0:240"
      builder: numeric
      params:
        series:
          - home_form_5
          - away_form_5
          - home_gs_5
          - away_gs_5
          - home_gc_5
          - away_gc_5
          - home_shots_5
          - away_shots_5
          - home_sot_5
          - away_sot_5
          - home_corners_5
          - away_corners_5
          - home_yellows_5
          - away_yellows_5
          - home_clean_sheets_5
          - away_clean_sheets_5
          - home_rest_days
          - away_rest_days
          - home_points_std
          - away_points_std
          - home_played_std
          - away_played_std
          - home_reds_std
          - away_reds_std
          - close_home_inv
          - close_draw_inv
          - close_away_inv
        rolling_window: 60
    - name: market_state
      slots: "240:336"
      builder: market_state
      params:
        series: [close_home_inv, close_draw_inv, close_away_inv]
        velocity_lags: [1, 3, 7]
    - name: text_lineups
      slots: "336:560"
      builder: text
      params:
        text_column: text__lineups
        mode: voyage
        window_days: 4
        encoder_name: voyage-3-large
        voyage_cache_dir: data/raw/betfair-eng-l1l2/_voyage_cache
    - name: text_injuries
      slots: "560:784"
      builder: text
      params:
        text_column: text__injuries
        mode: voyage
        window_days: 7
        encoder_name: voyage-3-large
        voyage_cache_dir: data/raw/betfair-eng-l1l2/_voyage_cache
    - name: text_manager
      slots: "784:1008"
      builder: text
      params:
        text_column: text__manager
        mode: voyage
        window_days: 7
        encoder_name: voyage-3-large
        voyage_cache_dir: data/raw/betfair-eng-l1l2/_voyage_cache
    - name: calendar
      slots: "1008:1024"
      builder: calendar
      params: {}
transformer:
  layers: 8
  model_dim: 256
  heads: 8
  ffn_mult: 4
  dropout: 0.1
train:
  batch_size: 32
  epochs: 30
  learning_rate: 2e-4
  weight_decay: 1e-2
  val_fraction: 0.15
backtest:
  commission_bps: 500
  base_slippage_bps: 50
  safety_margin_bps: 150
  kelly_fraction: 0.25
  kelly_cap: 0.02
