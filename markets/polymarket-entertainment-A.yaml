slug: polymarket-entertainment-A
display_name: Polymarket entertainment unified (Model A — numerical only)
platform: polymarket
notes: |
  Model A baseline for the dual A vs B PoC on broader entertainment Polymarket markets.

  Unifies ALL resolved (closed) entertainment markets across tags: oscars, emmys,
  golden-globes, grammys, baftas, sag-awards, critics-choice-awards, cannes, venice,
  berlin, sundance, box-office, movies, tv, streaming. Each market is one yes/no
  prediction at resolution.

  Features: Polymarket closing price (lastTradePrice clipped to [0.02, 0.98]) + market
  volume + market liquidity + days_open. No text. p_market = the Polymarket closing
  implied probability itself, so any edge over the closing line shows up as Brier
  improvement.

  Compare to polymarket-entertainment-B (same data, same model class) which adds
  Voyage-embedded haiku-scraped entertainment commentary per event_slug.
time_grain: daily
held_out_months: 6
sequence_length: 8
model: gbdt
data_sources:
  - name: polymarket_contracts
    kind: numeric
    params:
      tag_slugs:
        - oscars
        - emmys
        - golden-globes
        - grammys
        - baftas
        - sag-awards
        - critics-choice-awards
        - cannes
        - venice-film-festival
        - sundance
        - movies
        - tv
        - streaming
        - box-office
      limit_per_tag: 300
      start_date: 2020-01-01
      end_date: 2026-04-01
label:
  kind: binary
  target_event: market_resolves_yes
state_vector:
  dim: 128
  blocks:
    - name: numeric_features
      slots: "0:96"
      builder: numeric
      params:
        series:
          - market_volume
          - market_liquidity
          - days_open
          - yes_price_close
        rolling_window: 60
    - name: market_state
      slots: "96:112"
      builder: market_state
      params:
        series: [yes_price_close]
        velocity_lags: [1, 4]
    - name: calendar
      slots: "112:128"
      builder: calendar
      params: {}
backtest:
  commission_bps: 75       # Polymarket taker ~0.75%
  base_slippage_bps: 50
  safety_margin_bps: 150
  kelly_fraction: 0.20
  kelly_cap: 0.02
