slug: kalshi-weather
display_name: Kalshi weather outcomes
platform: kalshi
notes: |
  Hurricane landfall, temperature records, snowfall totals. Information edge: NOAA and
  ECMWF ensemble forecast disagreement signals model uncertainty that retail bettors
  ignore. The transformer learns to weight ensemble members against historical accuracy.
time_grain: daily
held_out_months: 6
sequence_length: 32
model: transformer
data_sources:
  - name: kalshi_contracts
    kind: market
    params:
      contracts: [HURRICANE, TEMPERATURE-RECORD, SNOWFALL]
  - name: fred
    kind: numeric
    params: {series: [NOAA_TEMP_ANOMALY, ENSO_SOI, ENSO_ONI]}
label:
  kind: binary
  target_event: weather_event
state_vector:
  dim: 512
  blocks:
    - name: weather_numeric
      slots: "0:256"
      builder: numeric
      params:
        series: [ensemble_mean, ensemble_std, ensemble_p10, ensemble_p90, sst_anomaly, wind_shear]
    - name: market_state
      slots: "256:384"
      builder: market_state
      params:
        series: [contract_yesno_price]
        velocity_lags: [1, 3, 7]
    - name: text_features
      slots: "384:496"
      builder: text
      params:
        mode: handcrafted
        entity_keywords: [warning, advisory, evacuation, record]
    - name: calendar
      slots: "496:512"
      builder: calendar
      params: {}
transformer:
  layers: 8
  model_dim: 384
  heads: 8
backtest:
  commission_bps: 20
  base_slippage_bps: 30
  safety_margin_bps: 150
  kelly_fraction: 0.25
  kelly_cap: 0.02
