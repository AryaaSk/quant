slug: betfair-tt-csl
display_name: Betfair Chinese Super League table tennis
platform: betfair
notes: |
  Chinese Super League table tennis. £2k-£15k per match. Mandarin-only press creates
  asymmetry; ITTF rankings + Sina/Tencent Sports scrape. High variance (upsets common).
time_grain: daily
held_out_months: 6
sequence_length: 16
model: gbdt
data_sources:
  - name: sofascore
    kind: numeric
    params: {leagues: [CHN-CSL-TT]}
label:
  kind: binary
  target_event: player_a_wins
state_vector:
  dim: 192
  blocks:
    - name: form_numeric
      slots: "0:128"
      builder: numeric
      params:
        series: [ittf_rank_a, ittf_rank_b, recent_form_a, recent_form_b, h2h_a, h2h_b, age_a, age_b]
    - name: market_state
      slots: "128:176"
      builder: market_state
      params:
        series: [a_decimal_odds, b_decimal_odds]
        velocity_lags: [1, 3]
    - name: calendar
      slots: "176:192"
      builder: calendar
      params: {}
backtest:
  commission_bps: 500
  base_slippage_bps: 100
  safety_margin_bps: 250
  kelly_fraction: 0.15
  kelly_cap: 0.01
