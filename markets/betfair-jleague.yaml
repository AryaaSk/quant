slug: betfair-jleague
display_name: Betfair J-League match outcomes
platform: betfair
notes: |
  Japanese top-flight football. £5k-£30k per match. Western books often mispriced because
  most pro modeling teams do not have Japanese-language scraping. Lineup leaks frequently
  appear on Twitter JP hours before official confirmation.
time_grain: daily
held_out_months: 6
sequence_length: 32
model: transformer
data_sources:
  - name: football_data
    kind: numeric
    params:
      leagues: [JPN-J1]
  - name: sofascore
    kind: text
    params: {leagues: [JPN-J1]}
label:
  kind: binary
  target_event: home_win
state_vector:
  dim: 384
  blocks:
    - name: form_numeric
      slots: "0:160"
      builder: numeric
      params:
        series: [home_xg, away_xg, home_form, away_form, home_rest_days, away_rest_days, home_travel_km]
    - name: market_state
      slots: "160:256"
      builder: market_state
      params:
        series: [home_decimal_odds, away_decimal_odds, draw_decimal_odds]
        velocity_lags: [1, 3]
    - name: text_features
      slots: "256:368"
      builder: text
      params:
        mode: handcrafted
        window_days: 7
        entity_keywords: [先発, 怪我, 出場, 累積警告, ベンチ]
    - name: calendar
      slots: "368:384"
      builder: calendar
      params: {}
transformer:
  layers: 8
  model_dim: 384
backtest:
  commission_bps: 500
  base_slippage_bps: 70
  safety_margin_bps: 150
  kelly_fraction: 0.20
  kelly_cap: 0.02
