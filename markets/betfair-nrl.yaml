slug: betfair-nrl
display_name: Betfair NRL Australian rugby league
platform: betfair
notes: |
  NRL has £10k-£50k per match. Western syndicates rarely model Australian rugby league.
  Edge: Australian press, weather (humid coast vs cold south), injury list timing, ref
  card tendencies, captain's-challenge dynamics.
time_grain: daily
held_out_months: 6
sequence_length: 32
model: transformer
data_sources:
  - name: sofascore
    kind: numeric
    params: {leagues: [AUS-NRL]}
label:
  kind: binary
  target_event: home_win
state_vector:
  dim: 384
  blocks:
    - name: form_numeric
      slots: "0:160"
      builder: numeric
      params:
        series: [home_pts_for_5, away_pts_for_5, home_pts_against_5, away_pts_against_5, home_rest_days, away_rest_days, home_travel_km, ref_penalty_per_match]
    - name: market_state
      slots: "160:256"
      builder: market_state
      params:
        series: [home_decimal_odds, away_decimal_odds, line]
        velocity_lags: [1, 3]
    - name: text_features
      slots: "256:368"
      builder: text
      params:
        mode: handcrafted
        entity_keywords: [Origin, injured, suspended, return, debut, halfback]
    - name: calendar
      slots: "368:384"
      builder: calendar
      params: {}
transformer:
  layers: 8
  model_dim: 384
backtest:
  commission_bps: 500
  base_slippage_bps: 60
  safety_margin_bps: 150
  kelly_fraction: 0.25
  kelly_cap: 0.02
